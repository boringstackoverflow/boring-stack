<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="ui-monospace, 'IBM Plex Mono', 'JetBrains Mono', Menlo, Consolas, monospace">
  <defs>
    <style>
      .bg     { fill: #0a0a0a; }
      .frame  { fill: none; stroke: #2b2b2b; stroke-width: 2; }
      .prompt { fill: #6c8eff; }
      .cmd    { fill: #f3f3f3; }
      .hero   { fill: #ffffff; font-weight: 700; }
      .dot    { fill: #ff5f1f; font-weight: 700; }
      .sub    { fill: #b8b8b8; }
      .line   { fill: #5e5e5e; }
      .badge  { fill: #ff5f1f; }
      .badge-text { fill: #0a0a0a; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="630"/>
  <rect class="frame" x="40" y="40" width="1120" height="460" rx="8"/>

  <!-- terminal prompt -->
  <text x="80" y="100" font-size="22" class="prompt">$</text>
  <text x="108" y="100" font-size="22" class="cmd">boring-stack</text>

  <!-- hero -->
  <text x="80" y="200" font-size="64" class="hero">Build web apps</text>
  <text x="80" y="276" font-size="64" class="hero">the boring way<tspan class="dot">.</tspan></text>

  <!-- subhead -->
  <text x="80" y="350" font-size="24" class="sub">Go + SQLite + Litestream + Caddy + systemd + a $5 VPS.</text>
  <text x="80" y="384" font-size="24" class="sub">A Claude Code skill that argues with the modern reflex.</text>

  <!-- divider -->
  <text x="80" y="430" font-size="20" class="line">─────────────────────────────────────────</text>

  <!-- badge + tools -->
  <rect class="badge" x="80" y="450" width="170" height="40" rx="4"/>
  <text x="92" y="478" font-size="20" class="badge-text">curl | bash</text>
  <text x="270" y="478" font-size="19" class="sub">Claude Code · Cursor · Copilot · Codex · Aider · +6 more</text>
</svg>
